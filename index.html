  transition: transform 220ms, box-shadow 220ms;
  animation: wa-pop 0.5s cubic-bezier(0.16,1,0.3,1) 1.5s both;
}
#wa-float:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(37,211,102,0.6); }
@keyframes wa-pop { from { opacity:0; transform:scale(0.5); } to { opacity:1; transform:scale(1); } }

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "es",
  "mode": "light",
  "page": "home"
}/*EDITMODE-END*/;

function App() {
  const [page, setPage] = React.useState(TWEAK_DEFAULTS.page);
  const [lang, setLang] = React.useState(TWEAK_DEFAULTS.lang);
  const [darkMode, setDarkMode] = React.useState(TWEAK_DEFAULTS.mode === 'dark');

  // Apply dark/light to body
  React.useEffect(() => {
    document.body.classList.toggle('light', !darkMode);
  }, [darkMode]);

  // Sync with tweaks panel external buttons
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data && e.data.type === '__activate_edit_mode') {
        document.getElementById('tweaks-panel').style.display = 'block';
      }
      if (e.data && e.data.type === '__deactivate_edit_mode') {
        document.getElementById('tweaks-panel').style.display = 'none';
      }
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // Tweaks panel wiring
  React.useEffect(() => {
    const panel = document.getElementById('tweaks-panel');
    const closeBtn = document.getElementById('tw-close-btn');

    const handleClick = (e) => {
      const btn = e.target.closest('[data-tw]');
      if (!btn) return;
      const tw = btn.dataset.tw;
      const val = btn.dataset.val;

      // Update active state
      panel.querySelectorAll(`[data-tw="${tw}"]`).forEach(b => b.classList.remove('on'));
      btn.classList.add('on');

      if (tw === 'lang') { setLang(val); window.parent.postMessage({type:'__edit_mode_set_keys',edits:{lang:val}},'*'); }
      if (tw === 'mode') { setDarkMode(val==='dark'); window.parent.postMessage({type:'__edit_mode_set_keys',edits:{mode:val}},'*'); }
      if (tw === 'page') { setPage(val); window.scrollTo(0,0); window.parent.postMessage({type:'__edit_mode_set_keys',edits:{page:val}},'*'); }
    };

    panel.addEventListener('click', handleClick);
    closeBtn.addEventListener('click', () => {
      panel.style.display = 'none';
      window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
    });
    return () => panel.removeEventListener('click', handleClick);
  }, []);

  const pages = { home: HomePage, services: ServiciosPage, about: SobreNosotrosPage, cases: CasosPage, blog: BlogPage, contact: ContactoPage };
  const PageComponent = pages[page] || HomePage;

  // Helper: go to contact and scroll to form
  const goToContactForm = React.useCallback(() => {
    setPage('contact');
    setTimeout(() => {
      const el = document.getElementById('contact-form');
      if (el) {
        const top = el.getBoundingClientRect().top + window.scrollY - 80;
        window.scrollTo({ top, behavior: 'smooth' });
      }
    }, 150);
  }, []);

  return (
    <div>
      <Nav page={page} setPage={setPage} lang={lang} setLang={setLang} darkMode={darkMode} setDarkMode={setDarkMode} goToContact={goToContactForm} />
      <main style={{paddingTop:0}} className="page-enter" key={page}>
        <PageComponent setPage={setPage} lang={lang} goToContact={goToContactForm} />
      </main>
      <Footer setPage={setPage} lang={lang} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
